<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.1/font/bootstrap-icons.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
      integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm"
      crossorigin="anonymous"
    />
    <title>card</title>
  </head>
  <body>
<div class="container">
  <div class="wrapper">
    <div class="img">
      <img src="https://learn.seytech.co/assets/projects/html-css/images/card/avatar.png"  alt="avatar photo" />
    </div>
    <div class="text">
      <div class="info">
        <div class="name">Aisulu Sultan</div>
        <div class="location">Philadelphia</div>
      </div>
      <div class="number">
        <div class="friend">
          <img id="icon" src="https://learn.seytech.co/assets/projects/html-css/images/card/icon.png" alt="person icon" />
          <div class="count">25 Friends</div>
        </div>
        <div class="date">Joined in 2015</div>
      </div>
    </div>
  </div>
</div>
  </body>
</html>
